<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0f172a">
    
    <!-- Paramètres pour l'installation sur téléphone -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tac-Tic">
    
    <title>Tac-Tic Chess</title>

    <!-- Icône pour le navigateur Web (Générée automatiquement en SVG avec le T orange) -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='112' fill='%230f172a'/><text x='50%' y='54%' dominant-baseline='middle' text-anchor='middle' fill='%23f59e0b' font-family='Arial, sans-serif' font-size='360' font-weight='bold'>T</text></svg>">
    
    <!-- Icône pour l'écran d'accueil du téléphone -->
    <link rel="apple-touch-icon" href="./icon.png">
    
    <!-- Fichier Manifest pour Android -->
    <link rel="manifest" href="./manifest.json">

    <!-- Tailwind CSS pour le style -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel pour compiler le JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Moteur d'échecs Lichess -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

    <!-- ========================================== -->
    <!-- CHARGEMENT DES MODULES FIREBASE            -->
    <!-- ========================================== -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        
        window.FirebaseLib = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, collection, doc, setDoc, getDocs, onSnapshot };
    </script>

    <style>
        body, html {
            background-color: #0f172a;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overscroll-behavior-y: contain; 
            -webkit-user-select: none;
            user-select: none;
        }
        .perspective-1000 { perspective: 1000px; }
        .preserve-3d { transform-style: preserve-3d; }
        .backface-hidden { backface-visibility: hidden; }
        .rotate-y-180 { transform: rotateY(180deg); }
        link[rel="apple-touch-icon"] { background-color: #1e293b; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // ============================================================================
        // 1. CONFIGURATION FIREBASE (À REMPLIR AVEC VOS IDENTIFIANTS)
        // ============================================================================
        const monFirebaseConfig = {
            apiKey: "VOTRE_API_KEY",
            authDomain: "VOTRE_PROJET.firebaseapp.com",
            projectId: "VOTRE_PROJET_ID",
            storageBucket: "VOTRE_PROJET.appspot.com",
            messagingSenderId: "VOTRE_SENDER_ID",
            appId: "VOTRE_APP_ID"
        };

        // ============================================================================
        // 2. CONFIGURATION DES BASES DE DONNÉES PAR ELO
        // ============================================================================
        const ELO_CATEGORIES = [400, 900, 1400, 1900, 2400];
        const ELO_URLS = {
            400: "./400-900-5000_problemes_aleatoires.csv",
            900: "./900-1400-5000_problemes_aleatoires.csv",
            1400: "./1400-1900-5000_problemes_aleatoires.csv",
            1900: "./1900-2400-5000_problemes_aleatoires.csv",
            2400: "./plus2400-5000_problemes_aleatoires.csv"
        };

        const FALLBACK_DB = [
          { id: "W1", color: "w", elo: 1200, fen: "r1b2rk1/pp3ppp/2n5/8/2B1Q3/1P6/P1P2PPP/R1B3K1 b - - 0 1", moves: ["b7b6", "c4f7", "f8f7", "e4e8", "f7f8", "e8f8"], explanation: "Secours: Attaque double." },
          { id: "B1", color: "b", elo: 1542, fen: "6k1/5p1p/4p3/4q3/3nN3/2Q3P1/PP3P1P/6K1 w - - 2 37", moves: ["e4d2", "d4e2", "g1f1", "e2c3"], explanation: "Secours: Fourchette Royale." },
          { id: "W2", color: "w", elo: 2205, fen: "r1b1kb1r/pppp1ppp/2n1p3/3nN3/3P2q1/4B3/PPP1BPPP/RN1Q1RK1 b kq - 9 8", moves: ["d5e3", "f2e3", "g4g5", "e5f7", "g5e3", "g1h1"], explanation: "Secours: Attaque à la découverte." },
          { id: "B2", color: "b", elo: 1980, fen: "6k1/p4pp1/7p/3p4/P1rP4/4P3/1p3PPP/1R4K1 w - - 0 31", moves: ["b1b2", "c4c1"], explanation: "Secours: Mat du couloir." },
          { id: "W3", color: "w", elo: 2861, fen: "r4r2/1p3pkp/p5p1/3R1N1Q/3P4/8/P1q2P2/3R2K1 b - - 3 25", moves: ["g6f5", "d5c5", "c2e4", "h5g5", "g7h8", "g5f6"], explanation: "Secours: Séquence magistrale." }
        ];

        // ============================================================================
        // FONCTION DE GESTION DES SONS
        // ============================================================================
        const playSound = (type) => {
            const urls = {
                move: 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Move.ogg',
                capture: 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Capture.ogg',
                flip: 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/GenericNotify.ogg',
                success: 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/GenericNotify.ogg',
                fail: 'https://cdn.jsdelivr.net/gh/lichess-org/lila@master/public/sound/standard/Error.ogg'
            };
            if (urls[type]) {
                const audio = new Audio(urls[type]);
                audio.play().catch(e => {}); 
            }
        };

        const posToAlgebraic = (r, c) => String.fromCharCode(97 + c) + (8 - r);
        const algebraicToPos = (alg) => ({ r: 8 - parseInt(alg[1]), c: alg.charCodeAt(0) - 97 });
        const toDateString = (dateObj) => {
          const year = dateObj.getFullYear();
          const month = String(dateObj.getMonth() + 1).padStart(2, '0');
          const day = String(dateObj.getDate()).padStart(2, '0');
          return `${year}-${month}-${day}`;
        };

        const formatTime = (secs) => {
            if (secs === 'NA' || secs === 'NA_solved' || (typeof secs === 'string' && secs.includes('_NA'))) return 'NA';
            if (secs == null) return '--:--';
            
            const m = Math.floor(secs / 60).toString();
            const s = (secs % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        const getScoreStats = (timesArray) => {
            const solvedCount = timesArray.filter(t => typeof t === 'number').length;
            const totalTime = timesArray.reduce((sum, t) => (typeof t === 'number' ? sum + t : sum), 0);
            return { solvedCount, totalTime };
        };

        const PIECE_URLS = {
          'P': 'https://upload.wikimedia.org/wikipedia/commons/4/45/Chess_plt45.svg', 'N': 'https://upload.wikimedia.org/wikipedia/commons/7/70/Chess_nlt45.svg',
          'B': 'https://upload.wikimedia.org/wikipedia/commons/b/b1/Chess_blt45.svg', 'R': 'https://upload.wikimedia.org/wikipedia/commons/7/72/Chess_rlt45.svg',
          'Q': 'https://upload.wikimedia.org/wikipedia/commons/1/15/Chess_qlt45.svg', 'K': 'https://upload.wikimedia.org/wikipedia/commons/4/42/Chess_klt45.svg',
          'p': 'https://upload.wikimedia.org/wikipedia/commons/c/c7/Chess_pdt45.svg', 'n': 'https://upload.wikimedia.org/wikipedia/commons/e/ef/Chess_ndt45.svg',
          'b': 'https://upload.wikimedia.org/wikipedia/commons/9/98/Chess_bdt45.svg', 'r': 'https://upload.wikimedia.org/wikipedia/commons/f/ff/Chess_rdt45.svg',
          'q': 'https://upload.wikimedia.org/wikipedia/commons/4/47/Chess_qdt45.svg', 'k': 'https://upload.wikimedia.org/wikipedia/commons/f/f0/Chess_kdt45.svg',
        };

        const IconArrowLeft = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
        const IconArrowRight = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
        const IconPlay = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const IconTrophy = ({ size = 24 }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22"/><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22"/><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z"/></svg>;
        const IconUser = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;

        function App() {
          const [isResourcesLoaded, setIsResourcesLoaded] = useState(false);
          const [isLoadingDB, setIsLoadingDB] = useState(false);
          
          const [databases, setDatabases] = useState({ 400: [], 900: [], 1400: [], 1900: [], 2400: [] });
          const [selectedElo, setSelectedElo] = useState(1400); 
          
          const [fbDb, setFbDb] = useState(null);
          const [fbUser, setFbUser] = useState(null);
          const [leaderboard, setLeaderboard] = useState([]);
          const [isFetchingLb, setIsFetchingLb] = useState(false);

          const [username, setUsername] = useState(localStorage.getItem('tactic_username') || `Joueur${Math.floor(Math.random()*10000)}`);
          const [isEditingUsername, setIsEditingUsername] = useState(false);

          const [view, setView] = useState('home');
          const [selectedDate, setSelectedDate] = useState(toDateString(new Date()));
          const [weekOffset, setWeekOffset] = useState(0); 
          const [isPracticeMode, setIsPracticeMode] = useState(false); 
          const [history, setHistory] = useState({});
          
          const [dailyPuzzles, setDailyPuzzles] = useState([]);
          const [currentPuzzleIdx, setCurrentPuzzleIdx] = useState(0);
          const [globalTime, setGlobalTime] = useState(300);
          const [isPaused, setIsPaused] = useState(true);
          const [isAnimating, setIsAnimating] = useState(false);
          
          const [game, setGame] = useState(null);
          const [currentFen, setCurrentFen] = useState('');
          const [puzzleState, setPuzzleState] = useState('playing');
          const [puzzleTimes, setPuzzleTimes] = useState([null, null, null, null, null]);
          const [currentPuzzleTime, setCurrentPuzzleTime] = useState(0);
          
          const [selectedSquare, setSelectedSquare] = useState(null);
          const [historyIndex, setHistoryIndex] = useState(0);
          const [maxHistoryIndex, setMaxHistoryIndex] = useState(0);
          const [flipped, setFlipped] = useState(false);
          const initialMoveTimeout = useRef(null);

          const boardRef = useRef(null);
          const activeDrag = useRef(null);
          const [ghostPiece, setGhostPiece] = useState(null);

          const getHistoryKey = (date, elo) => `${date}_${elo}`;

          useEffect(() => {
            const initApp = async () => {
                if (!window.Chess) {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js';
                    document.head.appendChild(script);
                    await new Promise(r => script.onload = r);
                }

                let database = null;
                const checkFirebase = setInterval(async () => {
                    if (window.FirebaseLib) {
                        clearInterval(checkFirebase);
                        try {
                            let finalConfig = monFirebaseConfig;
                            if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                                finalConfig = JSON.parse(__firebase_config);
                            }
                            const app = window.FirebaseLib.initializeApp(finalConfig);
                            const auth = window.FirebaseLib.getAuth(app);
                            database = window.FirebaseLib.getFirestore(app);
                            setFbDb(database);

                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await window.FirebaseLib.signInWithCustomToken(auth, __initial_auth_token);
                            } else {
                                await window.FirebaseLib.signInAnonymously(auth);
                            }

                            window.FirebaseLib.onAuthStateChanged(auth, (user) => setFbUser(user));
                        } catch(err) {
                            console.error("Erreur Firebase.", err);
                        }
                        setIsResourcesLoaded(true);
                    }
                }, 100);
            };
            initApp();

            const saved = localStorage.getItem('chessDaily_history_elo');
            if (saved) setHistory(JSON.parse(saved));
          }, []);

          useEffect(() => {
              const fetchEloDatabase = async () => {
                  if (databases[selectedElo].length > 0) return; 
                  
                  setIsLoadingDB(true);
                  try {
                      const response = await fetch(ELO_URLS[selectedElo]);
                      if (!response.ok) throw new Error("Fichier introuvable");
                      
                      const textData = await response.text();
                      let parsedData = null;

                      try {
                          parsedData = JSON.parse(textData);
                      } catch (e) {
                          const lines = textData.replace(/\r/g, '').trim().split('\n');
                          const headers = lines[0].split(',');
                          
                          const idIdx = headers.indexOf('PuzzleId');
                          const fenIdx = headers.indexOf('FEN');
                          const movesIdx = headers.indexOf('Moves');
                          const ratingIdx = headers.indexOf('Rating');

                          if (idIdx > -1 && fenIdx > -1 && movesIdx > -1) {
                              parsedData = [];
                              for (let i = 1; i < lines.length; i++) {
                                  const cols = lines[i].split(',');
                                  if (cols.length >= 4) {
                                      const fen = cols[fenIdx];
                                      const color = fen.includes(' b ') ? 'w' : 'b';
                                      
                                      parsedData.push({
                                          id: cols[idIdx],
                                          elo: parseInt(cols[ratingIdx]),
                                          fen: fen,
                                          moves: cols[movesIdx].split(' '),
                                          explanation: `Lichess #${cols[idIdx]} | ~${cols[ratingIdx]} Elo`,
                                          color: color
                                      });
                                  }
                              }
                          }
                      }
                      
                      if (Array.isArray(parsedData) && parsedData.length > 0 && parsedData[0].fen) {
                          setDatabases(prev => ({...prev, [selectedElo]: parsedData}));
                      } else {
                          throw new Error("Format de données invalide");
                      }
                  } catch (e) {
                      console.warn(`Impossible de charger la DB Elo ${selectedElo}, utilisation du secours.`);
                      setDatabases(prev => ({...prev, [selectedElo]: FALLBACK_DB})); 
                  } finally {
                      setIsLoadingDB(false);
                  }
              };

              if (isResourcesLoaded) fetchEloDatabase();
          }, [selectedElo, isResourcesLoaded]);

          const handleUsernameChange = (e) => {
              setUsername(e.target.value);
              localStorage.setItem('tactic_username', e.target.value);
          };

          const generatePuzzlesForDate = (dateStr, db) => {
            if (!db || db.length === 0) return [];
            const epoch = new Date('2024-01-01T12:00:00Z').getTime();
            const targetDate = new Date(dateStr + 'T12:00:00Z').getTime();
            const daysPassed = Math.floor((targetDate - epoch) / (1000 * 60 * 60 * 24));

            const selected = [];
            for (let i = 0; i < 5; i++) {
                const index = (Math.abs(daysPassed) * 5 + i) % db.length;
                selected.push(db[index]);
            }
            return selected;
          };

          useEffect(() => {
            const currentDb = databases[selectedElo];
            if (currentDb && currentDb.length > 0) {
              setDailyPuzzles(generatePuzzlesForDate(selectedDate, currentDb));
              const hKey = getHistoryKey(selectedDate, selectedElo);
              if (history[hKey]) setPuzzleTimes(history[hKey].times);
              else setPuzzleTimes([null, null, null, null, null]);
            }
          }, [selectedDate, selectedElo, history, databases]);

          useEffect(() => {
            let interval;
            if (view === 'playing' && !isPaused && globalTime > 0) {
              interval = setInterval(() => {
                setGlobalTime(prev => {
                  if (prev <= 1) { handleTimeOut(); return 0; }
                  return prev - 1;
                });
                setCurrentPuzzleTime(prev => prev + 1);
              }, 1000);
            }
            return () => clearInterval(interval);
          }, [view, isPaused, globalTime]);

          const handleTimeOut = () => {
            setIsPaused(true);
            setPuzzleState('failed');
            setPuzzleTimes(prev => {
              const newTimes = [...prev];
              if (!isPracticeMode) {
                  for (let i = currentPuzzleIdx; i < 5; i++) if (newTimes[i] === null) newTimes[i] = 'NA';
              }
              return newTimes;
            });
            setTimeout(() => finishDaily(), 2000);
          };

          const fetchLeaderboard = () => {
            if (!fbDb || !fbUser) return;
            setIsFetchingLb(true);
            
            const { collection, onSnapshot } = window.FirebaseLib;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'tacticchess';
            const colRef = collection(fbDb, 'artifacts', appId, 'public', 'data', 'scores');
            
            const unsubscribe = onSnapshot(colRef, (snapshot) => {
                const allDocs = snapshot.docs.map(d => d.data());
                const dayScores = allDocs.filter(s => s.date === selectedDate && s.elo === selectedElo);
                
                dayScores.sort((a, b) => {
                    const statsA = getScoreStats(a.times);
                    const statsB = getScoreStats(b.times);

                    if (statsA.solvedCount !== statsB.solvedCount) {
                        return statsB.solvedCount - statsA.solvedCount; 
                    }
                    return statsA.totalTime - statsB.totalTime; 
                });
                
                setLeaderboard(dayScores);
                setIsFetchingLb(false);
            }, (error) => {
                console.error("Erreur récupération classement", error);
                setIsFetchingLb(false);
            });
            
            return unsubscribe;
          };

          useEffect(() => {
              let unsub;
              if (view === 'leaderboard') unsub = fetchLeaderboard();
              return () => { if (unsub) unsub(); }
          }, [view, selectedDate, selectedElo, fbUser]);


          const initPuzzle = (idx) => {
            const puz = dailyPuzzles[idx];
            if(!puz) return;
            
            const newGame = new window.Chess(puz.fen);
            if (initialMoveTimeout.current) clearTimeout(initialMoveTimeout.current);

            setGame(newGame);
            setCurrentFen(newGame.fen()); 
            setCurrentPuzzleIdx(idx);
            setHistoryIndex(0);
            setMaxHistoryIndex(0);
            setCurrentPuzzleTime(0);
            setPuzzleState('playing');
            setFlipped(false);
            setSelectedSquare(null);
            setIsPaused(true); 
            setIsAnimating(true);

            initialMoveTimeout.current = setTimeout(() => {
              const firstMoveUci = puz.moves[0];
              const firstMove = newGame.move({ from: firstMoveUci.substring(0, 2), to: firstMoveUci.substring(2, 4), promotion: firstMoveUci.length === 5 ? firstMoveUci[4] : 'q' });
              
              if (firstMove) {
                 if (firstMove.captured) playSound('capture');
                 else playSound('move');
              }
              
              setCurrentFen(newGame.fen());
              setHistoryIndex(1);
              setMaxHistoryIndex(1);
              setIsPaused(false);
              setIsAnimating(false);
            }, 1000);
          };

          const startPlayingPhase = (forcePractice = false) => {
            setIsPracticeMode(forcePractice);
            const hKey = getHistoryKey(selectedDate, selectedElo);
            const oldHistoryDay = history[hKey];
            let initialTimes = [null, null, null, null, null];
            
            let savedTime = 300;

            if (oldHistoryDay) {
                initialTimes = [...oldHistoryDay.times];
                if (oldHistoryDay.remainingTime !== undefined) {
                    savedTime = oldHistoryDay.remainingTime;
                }
            }
            setPuzzleTimes(initialTimes);

            let firstUnsolved = 0;
            if (!forcePractice) {
                for(let i = 0; i < 5; i++) {
                   if (initialTimes[i] === null) { firstUnsolved = i; break; }
                }
            } else {
                savedTime = 300; // En practice, on ne s'occupe pas du chrono
                
                // Si on lance "Corriger mes erreurs", on cible d'abord le premier NA !
                const isCorrection = initialTimes.some(t => t === 'NA');
                if (isCorrection) {
                    for(let i = 0; i < 5; i++) {
                        if (initialTimes[i] === 'NA') { firstUnsolved = i; break; }
                    }
                }
            }
            
            setGlobalTime(savedTime);
            setView('playing');
            initPuzzle(firstUnsolved);
          };

          const animateSolutionAndFail = (didMakeWrongMove) => {
            setIsPaused(true);
            setIsAnimating(true);
            setPuzzleState('failed');
            
            setPuzzleTimes(prev => { 
                const newTimes = [...prev]; 
                if (!isPracticeMode) {
                    newTimes[currentPuzzleIdx] = 'NA'; 
                }
                return newTimes; 
            });

            const startAnimation = () => {
              if (didMakeWrongMove) { game.undo(); setCurrentFen(game.fen()); }
              let tempIndex = historyIndex;
              const currentPuzzle = dailyPuzzles[currentPuzzleIdx];

              const playNext = () => {
                if (tempIndex >= currentPuzzle.moves.length) {
                  setHistoryIndex(tempIndex);
                  initialMoveTimeout.current = setTimeout(() => { 
                      setFlipped(true); 
                      playSound('fail'); 
                      setIsAnimating(false); 
                  }, 600);
                  return;
                }
                const nextUci = currentPuzzle.moves[tempIndex];
                const m = game.move({ from: nextUci.substring(0, 2), to: nextUci.substring(2, 4), promotion: nextUci.length === 5 ? nextUci[4] : 'q' });
                
                if (m) {
                    if (m.captured) playSound('capture');
                    else playSound('move');
                }
                
                setCurrentFen(game.fen());
                tempIndex++;
                setHistoryIndex(tempIndex);
                initialMoveTimeout.current = setTimeout(playNext, 500);
              };

              if (didMakeWrongMove) initialMoveTimeout.current = setTimeout(playNext, 500);
              else playNext();
            };

            if (didMakeWrongMove) initialMoveTimeout.current = setTimeout(startAnimation, 800);
            else startAnimation();
          };

          const processMove = (fromR, fromC, toR, toC) => {
            if (!game || isAnimating) return;
            const fromAlg = posToAlgebraic(fromR, fromC);
            const toAlg = posToAlgebraic(toR, toC);
            const currentPuzzle = dailyPuzzles[currentPuzzleIdx];
            const expectedUci = currentPuzzle.moves[historyIndex];

            const moveAttempt = game.move({ from: fromAlg, to: toAlg, promotion: 'q' });
            if (moveAttempt === null) { setSelectedSquare(null); return; }

            if (moveAttempt.captured) playSound('capture');
            else playSound('move');

            if (fromAlg === expectedUci.substring(0, 2) && toAlg === expectedUci.substring(2, 4)) {
              setCurrentFen(game.fen());
              setSelectedSquare(null);
              setHistoryIndex(prev => prev + 1);
              setMaxHistoryIndex(prev => prev + 1);

              if (historyIndex + 1 === currentPuzzle.moves.length) {
                handlePuzzleEnd('solved');
              } else {
                setIsPaused(true);
                setIsAnimating(true);
                setTimeout(() => {
                  const oppUci = currentPuzzle.moves[historyIndex + 1];
                  const oppMove = game.move({ from: oppUci.substring(0, 2), to: oppUci.substring(2, 4), promotion: oppUci.length === 5 ? oppUci[4] : 'q' });
                  
                  if (oppMove) {
                      if (oppMove.captured) playSound('capture');
                      else playSound('move');
                  }
                  
                  setCurrentFen(game.fen());
                  setHistoryIndex(prev => prev + 1);
                  setMaxHistoryIndex(prev => prev + 1);
                  
                  if (historyIndex + 2 === currentPuzzle.moves.length) handlePuzzleEnd('solved');
                  else { setIsPaused(false); setIsAnimating(false); }
                }, 500);
              }
            } else {
              setCurrentFen(game.fen());
              setSelectedSquare(null);
              animateSolutionAndFail(true);
            }
          };

          const handlePointerDown = (e, r, c) => {
            if (e.button !== undefined && e.button !== 0) return;
            if (puzzleState !== 'playing' || isPaused || isAnimating || !game) return;
            if (historyIndex !== maxHistoryIndex) { navigateHistory(maxHistoryIndex - historyIndex); return; }

            const alg = posToAlgebraic(r, c);
            const piece = game.get(alg);
            const currentPuzzleColor = dailyPuzzles[currentPuzzleIdx].color;
            const isPlayerPiece = piece && piece.color === currentPuzzleColor;

            if (!isPlayerPiece) {
              if (selectedSquare) processMove(selectedSquare.r, selectedSquare.c, r, c);
              return;
            }

            setSelectedSquare({ r, c });
            if (boardRef.current) {
              const boardRect = boardRef.current.getBoundingClientRect();
              const squareSize = boardRect.width / 8;
              activeDrag.current = { r, c, piece, boardRect, squareSize, startX: e.clientX, startY: e.clientY, isDragging: false };
            }
          };

          const handleGlobalPointerMove = (e) => {
            if (!activeDrag.current || isAnimating) return;
            if (!activeDrag.current.isDragging) {
              const dx = e.clientX - activeDrag.current.startX;
              const dy = e.clientY - activeDrag.current.startY;
              if (Math.sqrt(dx * dx + dy * dy) > 5) activeDrag.current.isDragging = true;
            }

            if (activeDrag.current.isDragging) {
              let charMap = null;
              if (activeDrag.current.piece) charMap = activeDrag.current.piece.color === 'w' ? activeDrag.current.piece.type.toUpperCase() : activeDrag.current.piece.type;
              setGhostPiece({ piece: charMap, originR: activeDrag.current.r, originC: activeDrag.current.c, x: e.clientX, y: e.clientY });
            }
          };

          const handleGlobalPointerUp = (e) => {
            if (!activeDrag.current || isAnimating) return;
            const { r: fromR, c: fromC, boardRect, squareSize, isDragging } = activeDrag.current;
            activeDrag.current = null;
            setGhostPiece(null);

            if (isDragging) {
              const x = e.clientX - boardRect.left;
              const y = e.clientY - boardRect.top;
              const toC = Math.floor(x / squareSize);
              const toR = Math.floor(y / squareSize);

              const currentPuzzle = dailyPuzzles[currentPuzzleIdx];
              const isBlackToPlay = currentPuzzle && currentPuzzle.color === 'b';
              const logicalToC = isBlackToPlay ? 7 - toC : toC;
              const logicalToR = isBlackToPlay ? 7 - toR : toR;

              if (logicalToC >= 0 && logicalToC < 8 && logicalToR >= 0 && logicalToR < 8) {
                if (fromR !== logicalToR || fromC !== logicalToC) processMove(fromR, fromC, logicalToR, logicalToC);
              }
            }
          };

          const handlePuzzleEnd = (status) => {
            setIsPaused(true);
            setPuzzleState(status);
            
            setPuzzleTimes(prev => {
              const newTimes = [...prev];
              const oldVal = newTimes[currentPuzzleIdx];

              if (status === 'solved') {
                  if (isPracticeMode) {
                      if (oldVal === 'NA' || oldVal === 'NA_solved' || (typeof oldVal === 'string' && oldVal.includes('_NA'))) {
                          newTimes[currentPuzzleIdx] = 'NA_solved';
                      } else if (typeof oldVal === 'number') {
                          newTimes[currentPuzzleIdx] = Math.min(currentPuzzleTime, oldVal);
                      } else {
                          newTimes[currentPuzzleIdx] = currentPuzzleTime;
                      }
                  } else {
                      newTimes[currentPuzzleIdx] = currentPuzzleTime;
                  }
              } else {
                  if (!isPracticeMode) {
                      newTimes[currentPuzzleIdx] = 'NA';
                  }
              }
              
              return newTimes;
            });

            if (status === 'solved') {
              setIsAnimating(true);
              initialMoveTimeout.current = setTimeout(() => { 
                  setFlipped(true); 
                  playSound('success');
                  setIsAnimating(false); 
              }, 600);
            }
          };

          const surrenderPuzzle = () => {
            if (puzzleState !== 'playing' || isAnimating) return;
            animateSolutionAndFail(false);
          };

          const prevPuzzle = () => {
            if (isAnimating) return;
            if (currentPuzzleIdx > 0) {
                initPuzzle(currentPuzzleIdx - 1);
            }
          };

          // ===============================================================
          // LOGIQUE INTELLIGENTE DU BOUTON SUIVANT
          // ===============================================================
          const nextPuzzle = () => {
            if (isAnimating) return;
            let nextIdx = currentPuzzleIdx + 1;
            
            if (!isPracticeMode) {
                // Partie Officielle: On cherche la prochaine case non jouée
                while(nextIdx < 5 && puzzleTimes[nextIdx] !== null) nextIdx++;
                if (nextIdx < 5) initPuzzle(nextIdx);
                else finishDaily(); 
            } else {
                // Mode Entraînement: On distingue "Corriger" vs "Rejouer"
                const hKey = getHistoryKey(selectedDate, selectedElo);
                const histDay = history[hKey];
                const isCorrectionSession = histDay && (histDay.officialTimes || histDay.times).some(t => t === 'NA');
                
                if (isCorrectionSession) {
                    // On cherche d'abord la prochaine erreur APRÈS le puzzle actuel
                    const remainingNA = puzzleTimes.findIndex((t, idx) => t === 'NA' && idx > currentPuzzleIdx);
                    if (remainingNA !== -1) {
                        initPuzzle(remainingNA);
                    } else {
                        // S'il n'y a pas d'erreur après, on cherche s'il y en a une AVANT (boucle)
                        const anyNA = puzzleTimes.findIndex(t => t === 'NA');
                        if (anyNA !== -1) {
                            initPuzzle(anyNA);
                        } else {
                            // PLUS AUCUNE ERREUR ! On a tout corrigé, on retombe automatiquement à l'accueil.
                            finishDaily(true); 
                        }
                    }
                } else {
                    // Mode "Rejouer pour le fun" (Aucune erreur à corriger)
                    if (nextIdx < 5) initPuzzle(nextIdx);
                    else finishDaily(true); // Fini de s'amuser, retour accueil
                }
            }
          };

          const saveScoreToFirebase = async (mergedTimes) => {
              if (!fbUser || !fbDb || !window.FirebaseLib) return;
              
              const isPerfect = mergedTimes.every(t => typeof t === 'number');
              
              try {
                  const { doc, setDoc } = window.FirebaseLib;
                  const appId = typeof __app_id !== 'undefined' ? __app_id : 'tacticchess';
                  const docRef = doc(fbDb, 'artifacts', appId, 'public', 'data', 'scores', `${selectedDate}_${selectedElo}_${fbUser.uid}`);
                  
                  await setDoc(docRef, {
                      date: selectedDate,
                      elo: selectedElo,
                      userId: fbUser.uid,
                      username: username || "Joueur Anonyme",
                      times: mergedTimes,
                      isPerfect: isPerfect,
                      timestamp: Date.now()
                  });
              } catch (e) {
                  console.error("Erreur lors de la sauvegarde Firebase :", e);
              }
          };

          const finishDaily = async (goToHome = false) => {
            if (goToHome) setView('home');
            else setView('summary');

            const hKey = getHistoryKey(selectedDate, selectedElo);
            const oldHistoryDay = history[hKey];
            
            const mergedTimes = [...puzzleTimes];

            if (!isPracticeMode) {
                const officialTimes = [...mergedTimes];
                const newHistory = { 
                    ...history, 
                    [hKey]: { 
                        times: mergedTimes, 
                        officialTimes: officialTimes, 
                        remainingTime: globalTime,
                        timestamp: Date.now() 
                    } 
                };
                setHistory(newHistory);
                localStorage.setItem('chessDaily_history_elo', JSON.stringify(newHistory));
                
                await saveScoreToFirebase(officialTimes);
            } else {
                const officialTimes = oldHistoryDay ? (oldHistoryDay.officialTimes || oldHistoryDay.times) : mergedTimes;
                const newHistory = { 
                    ...history, 
                    [hKey]: { 
                        times: mergedTimes, 
                        officialTimes: officialTimes, 
                        remainingTime: oldHistoryDay ? oldHistoryDay.remainingTime : 300,
                        timestamp: Date.now() 
                    } 
                };
                setHistory(newHistory);
                localStorage.setItem('chessDaily_history_elo', JSON.stringify(newHistory));
            }
          };

          const navigateHistory = (dir) => {
            if (isAnimating) return; 
            const currentPuzzle = dailyPuzzles[currentPuzzleIdx];
            let newIndex = historyIndex + dir;
            if (newIndex < 0) newIndex = 0; 
            const limit = puzzleState === 'playing' ? maxHistoryIndex : currentPuzzle.moves.length;
            if (newIndex > limit) newIndex = limit;
            
            setHistoryIndex(newIndex);
            const newGame = new window.Chess(currentPuzzle.fen);
            let lastMove = null;
            for (let i = 0; i < newIndex; i++) {
              const m = currentPuzzle.moves[i];
              lastMove = newGame.move({ from: m.substring(0, 2), to: m.substring(2, 4), promotion: m.length === 5 ? m[4] : 'q' });
            }
            
            if (lastMove) {
                if (lastMove.captured) playSound('capture');
                else playSound('move');
            }
            
            setGame(newGame);
            setCurrentFen(newGame.fen());
          };

          if (!isResourcesLoaded) {
            return (
              <div className="flex flex-col items-center justify-center h-screen bg-slate-900 text-amber-400 font-bold space-y-4">
                <div className="w-12 h-12 border-4 border-amber-400 border-t-transparent rounded-full animate-spin"></div>
                <div className="text-xl text-slate-100">Mise en place de Tac-Tic Chess...</div>
              </div>
            );
          }

          const renderHome = () => {
            const hKey = getHistoryKey(selectedDate, selectedElo);
            const historyDay = history[hKey];
            
            const isStarted = historyDay !== undefined;
            const offTimes = historyDay ? (historyDay.officialTimes || historyDay.times) : [];
            const isCompleted = isStarted && offTimes.every(t => t !== null);
            
            const currentTimes = historyDay ? historyDay.times : [];
            const isPerfect = isCompleted && currentTimes.every(t => typeof t === 'number' || t === 'NA_solved' || (typeof t === 'string' && t.includes('_NA')));

            const allKeysThisElo = Object.keys(history).filter(k => k.endsWith(`_${selectedElo}`));
            const totalAttempted = allKeysThisElo.reduce((acc, k) => {
                const off = history[k].officialTimes || history[k].times;
                return acc + off.filter(t => t !== null).length;
            }, 0);
            const totalSolved = allKeysThisElo.reduce((acc, k) => {
                const off = history[k].officialTimes || history[k].times;
                return acc + off.filter(t => typeof t === 'number').length;
            }, 0);

            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const dayOfWeek = today.getDay();
            const distanceToMonday = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
            
            const monday = new Date(today);
            monday.setDate(today.getDate() + distanceToMonday + (weekOffset * 7));

            const weekDays = [];
            const initials = ['L', 'M', 'M', 'J', 'V', 'S', 'D'];
            for (let i = 0; i < 7; i++) {
              const d = new Date(monday);
              d.setDate(monday.getDate() + i);
              const dateStr = toDateString(d);
              weekDays.push({ dateStr, initial: initials[i], isToday: dateStr === toDateString(today), isFuture: d > today });
            }

            let weekLabel = "Semaine actuelle";
            if (weekOffset < 0) weekLabel = `Semaine N${weekOffset}`;
            if (weekOffset > 0) weekLabel = `Semaine N+${weekOffset}`;

            return (
              <div className="flex flex-col items-center p-4 sm:p-6 space-y-5 w-full max-w-md mx-auto min-h-screen bg-slate-900 text-slate-100 overflow-y-auto pb-20">
                <h1 className="text-4xl font-black text-center mt-4 sm:mt-6 text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-amber-500 drop-shadow-lg">Tac-Tic Chess</h1>
                
                <div className="w-full bg-slate-800 p-3 rounded-xl border border-slate-700 flex justify-between items-center shadow-md">
                    <div className="flex items-center gap-2 text-slate-300">
                        <IconUser />
                        {isEditingUsername ? (
                            <input type="text" value={username} onChange={handleUsernameChange} onBlur={() => setIsEditingUsername(false)} autoFocus className="bg-slate-900 text-amber-400 font-bold px-2 py-1 rounded outline-none w-32" />
                        ) : (
                            <span className="font-bold text-amber-400 cursor-pointer hover:text-amber-300" onClick={() => setIsEditingUsername(true)}>
                                {username} <span className="text-xs text-slate-500 font-normal ml-1">✏️ modifier</span>
                            </span>
                        )}
                    </div>
                </div>

                <div className="w-full">
                    <h3 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2 pl-1">Difficulté (Elo)</h3>
                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                        {ELO_CATEGORIES.map(elo => (
                            <button 
                                key={elo} 
                                onClick={() => setSelectedElo(elo)}
                                className={`flex-1 min-w-[60px] py-2 rounded-lg font-bold text-sm transition ${selectedElo === elo ? 'bg-amber-500 text-slate-900 shadow-[0_0_10px_rgba(245,158,11,0.5)]' : 'bg-slate-800 text-slate-400 border border-slate-700 hover:bg-slate-700'}`}
                            >
                                {elo}
                            </button>
                        ))}
                    </div>
                </div>

                <div className="w-full flex flex-col bg-slate-800 p-4 rounded-xl shadow-lg border border-slate-700 gap-4">
                  <div className="w-full flex justify-between items-center px-2">
                     <button onClick={() => setWeekOffset(w => w - 1)} className="p-1 hover:bg-slate-700 rounded-lg text-slate-400 transition"><IconArrowLeft size={20}/></button>
                     <div className="flex flex-col items-center"><span className="font-bold text-amber-400">{weekLabel}</span></div>
                     <button onClick={() => setWeekOffset(w => w + 1)} className="p-1 hover:bg-slate-700 rounded-lg text-slate-400 transition"><IconArrowRight size={20}/></button>
                  </div>

                  {weekOffset !== 0 && (
                     <div className="w-full flex justify-center -mt-2 mb-1">
                        <button onClick={() => { setWeekOffset(0); setSelectedDate(toDateString(today)); }} className="text-[11px] bg-slate-700 hover:bg-slate-600 text-slate-300 px-3 py-1 rounded-full transition">Retour à la semaine actuelle</button>
                     </div>
                  )}
                  
                  <div className="flex justify-between w-full">
                    {weekDays.map((day) => {
                       const loopHKey = getHistoryKey(day.dateStr, selectedElo);
                       const loopHistDay = history[loopHKey];
                       const loopDayIsStarted = loopHistDay !== undefined;
                       
                       const loopOffTimes = loopHistDay ? (loopHistDay.officialTimes || loopHistDay.times) : [];
                       const loopDayIsCompleted = loopDayIsStarted && loopOffTimes.every(t => t !== null);
                       
                       const loopCurrentTimes = loopHistDay ? loopHistDay.times : [];
                       const loopDayIsPerfect = loopDayIsCompleted && loopCurrentTimes.every(t => typeof t === 'number' || t === 'NA_solved' || (typeof t === 'string' && t.includes('_NA')));
                       
                       const isSelected = selectedDate === day.dateStr;
                       
                       let baseClass = "w-9 h-9 sm:w-10 sm:h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all ";
                       
                       if (day.isFuture) baseClass += "bg-slate-800 text-slate-600 cursor-not-allowed border border-slate-700/50";
                       else if (loopDayIsCompleted) {
                         if (loopDayIsPerfect) baseClass += "bg-emerald-500 text-white shadow-[0_0_8px_rgba(16,185,129,0.5)] cursor-pointer";
                         else baseClass += "bg-red-500 text-white shadow-[0_0_8px_rgba(239,68,68,0.5)] cursor-pointer";
                       } 
                       else if (loopDayIsStarted) baseClass += "bg-amber-500 text-white shadow-[0_0_8px_rgba(245,158,11,0.5)] cursor-pointer";
                       else if (day.isToday) baseClass += "bg-slate-600 text-slate-200 shadow-[0_0_8px_rgba(148,163,184,0.5)] cursor-pointer";
                       else baseClass += "bg-slate-700 text-slate-300 hover:bg-slate-600 cursor-pointer";

                       if (isSelected) baseClass += " ring-2 ring-white ring-offset-2 ring-offset-slate-800";

                       return (
                         <button key={day.dateStr} disabled={day.isFuture} onClick={() => setSelectedDate(day.dateStr)} className={baseClass}>
                           {day.initial}
                         </button>
                       );
                    })}
                  </div>
                </div>

                <div className="text-center space-y-4 w-full">
                  {isLoadingDB ? (
                      <div className="flex justify-center p-6"><div className="w-8 h-8 border-4 border-amber-400 border-t-transparent rounded-full animate-spin"></div></div>
                  ) : isStarted ? (
                    <div className={`p-4 sm:p-6 rounded-xl border shadow-xl w-full relative overflow-hidden ${isPerfect ? 'bg-slate-800 border-emerald-600/50 shadow-emerald-900/20' : (isCompleted ? 'bg-slate-800 border-red-600/50 shadow-red-900/20' : 'bg-slate-800 border-amber-600/50 shadow-amber-900/20')}`}>
                      <div className={`absolute top-0 right-0 p-3 opacity-20 ${isPerfect ? 'text-emerald-400' : (isCompleted ? 'text-red-400' : 'text-amber-400')}`}><IconTrophy /></div>
                      <h2 className={`text-xl font-bold mb-4 ${isPerfect ? 'text-emerald-400' : (isCompleted ? 'text-red-400' : 'text-amber-400')}`}>
                        {isPerfect ? "Tous résolus !" : (isCompleted ? "Session terminée" : "Session en cours...")}
                      </h2>
                      <div className="flex justify-between sm:justify-center sm:space-x-4 mb-6">
                        {currentTimes.map((t, i) => {
                          const isPracticeSuccess = t === 'NA_solved' || (typeof t === 'string' && t.includes('_NA'));
                          let colorClass = 'text-emerald-400';
                          if (t === 'NA') colorClass = 'text-red-400';
                          else if (t === null) colorClass = 'text-slate-600';

                          return (
                            <div key={i} className="flex flex-col items-center">
                              <span className="text-xs text-slate-400">P{i+1}</span>
                              <span className={`text-sm sm:text-lg font-mono font-bold ${colorClass}`}>
                                {t === null ? '--' : formatTime(t)}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                      
                      {isCompleted ? (
                          <button onClick={() => startPlayingPhase(true)} className="w-full py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold shadow-lg transition flex justify-center items-center gap-2">
                            <IconPlay /> {isPerfect ? "Rejouer pour le fun" : "Corriger mes erreurs"}
                          </button>
                      ) : (
                          <button onClick={() => startPlayingPhase(false)} className="w-full py-3 bg-amber-600 hover:bg-amber-500 text-white rounded-xl font-bold shadow-lg transition flex justify-center items-center gap-2">
                            <IconPlay /> Continuer la session
                          </button>
                      )}
                    </div>
                  ) : (
                    <button onClick={() => startPlayingPhase(false)} className="w-full py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold text-lg shadow-lg shadow-emerald-600/30 transition transform hover:-translate-y-1 flex justify-center items-center gap-2">
                      <IconPlay /> Démarrer les 5 Minutes
                    </button>
                  )}

                  {/* BOUTON LEADERBOARD */}
                  <button onClick={() => setView('leaderboard')} className="w-full py-3 bg-indigo-600 hover:bg-indigo-500 text-white rounded-xl font-bold shadow-lg transition flex justify-center items-center gap-2 mt-4">
                     🏆 Voir le Classement ({selectedElo} Elo)
                  </button>
                </div>

                <div className="w-full mt-2 bg-slate-800 rounded-xl p-4 border border-slate-700 text-center">
                  <h3 className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Stats Officielles ({selectedElo} Elo)</h3>
                  <div className="flex justify-around items-center py-2">
                     <div>
                        <div className="text-2xl font-bold text-amber-400">{allKeysThisElo.length}</div>
                        <div className="text-xs text-slate-500">Jours joués</div>
                     </div>
                     <div>
                        <div className="text-2xl font-bold text-emerald-400">{totalSolved} <span className="text-lg text-slate-500">/ {totalAttempted}</span></div>
                        <div className="text-xs text-slate-500">Problèmes réussis (du 1er coup)</div>
                     </div>
                  </div>
                </div>
              </div>
            );
          };

          const renderLeaderboard = () => {
              return (
                <div className="flex flex-col p-4 sm:p-6 w-full max-w-md mx-auto min-h-screen bg-slate-900 text-slate-100 overflow-y-auto">
                    <div className="flex items-center mb-8 mt-4">
                        <button onClick={() => setView('home')} className="p-2 bg-slate-800 hover:bg-slate-700 rounded-xl text-slate-300 transition">
                            <IconArrowLeft />
                        </button>
                        <h2 className="text-2xl font-bold text-center flex-1 text-indigo-400">Classement</h2>
                        <div className="w-10"></div>
                    </div>

                    <div className="text-center mb-6">
                        <p className="text-slate-400 text-sm">Scores pour le {selectedDate}</p>
                        <p className="text-xl font-bold text-amber-400">Catégorie {selectedElo} Elo</p>
                    </div>

                    {isFetchingLb ? (
                         <div className="flex justify-center py-10"><div className="w-8 h-8 border-4 border-indigo-400 border-t-transparent rounded-full animate-spin"></div></div>
                    ) : leaderboard.length === 0 ? (
                        <div className="text-center p-8 bg-slate-800 rounded-xl border border-slate-700 text-slate-400">
                            Soyez le premier à terminer vos problèmes en {selectedElo} Elo aujourd'hui !
                        </div>
                    ) : (
                        <div className="space-y-3 pb-8">
                            {leaderboard.map((score, index) => {
                                const stats = getScoreStats(score.times);
                                return (
                                    <div key={index} className={`flex flex-col gap-2 p-4 rounded-xl border ${score.userId === fbUser?.uid ? 'bg-indigo-900/40 border-indigo-500/50' : 'bg-slate-800 border-slate-700'} shadow-md`}>
                                        <div className="flex items-center gap-3">
                                            <div className="font-black text-slate-500 w-6 text-lg">{index + 1}.</div>
                                            <span className={`font-bold text-lg ${score.userId === fbUser?.uid ? 'text-indigo-300' : 'text-slate-200'}`}>
                                                {score.username}
                                                {score.userId === fbUser?.uid && " (Vous)"}
                                            </span>
                                        </div>
                                        
                                        <div className="pl-9 font-mono text-[11px] sm:text-xs text-slate-400 flex items-center flex-wrap gap-x-1.5">
                                            {score.times.map((t, i) => (
                                                <React.Fragment key={i}>
                                                    <span className={t === 'NA' ? 'text-red-400' : (typeof t === 'number' ? 'text-emerald-400' : 'text-slate-500')}>
                                                        {t === 'NA' ? 'NA' : (t === null ? '--:--' : formatTime(t))}
                                                    </span>
                                                    {i < 4 && <span className="text-slate-600">|</span>}
                                                </React.Fragment>
                                            ))}
                                            <span className="text-slate-600 ml-1">|</span>
                                            <span className={`font-bold ml-1 ${stats.solvedCount === 5 ? 'text-emerald-400' : (stats.solvedCount > 0 ? 'text-amber-400' : 'text-red-400')}`}>
                                                T={formatTime(stats.totalTime)}
                                            </span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                </div>
              );
          };

          const renderSummary = () => {
            const displayTimes = puzzleTimes;
            const localSolvedCount = displayTimes.filter(t => typeof t === 'number' || t === 'NA_solved' || (typeof t === 'string' && t.includes('_NA'))).length;
            const isLocalPerfect = localSolvedCount === 5;
            
            const stats = getScoreStats(displayTimes);

            const copyToClipboard = () => {
                const hKey = getHistoryKey(selectedDate, selectedElo);
                const officialTimes = history[hKey] ? (history[hKey].officialTimes || history[hKey].times) : puzzleTimes;
                const officialStats = getScoreStats(officialTimes);
                
                const emojiBlocks = officialTimes.map(t => typeof t === 'number' ? '🟢' : (t === 'NA' ? '🔴' : '⚪')).join('');
                const text = `♟️ Tac-Tic Chess (${selectedElo} Elo) - ${selectedDate}\n${emojiBlocks}\n${officialStats.solvedCount === 5 ? `⏱️ Temps : ${formatTime(officialStats.totalTime)}` : `❌ Score Officiel (${officialStats.solvedCount}/5)`}\nJouez ici : ${window.location.href}`;
                navigator.clipboard.writeText(text).then(() => alert("Votre score officiel a été copié !"));
            };

            return (
              <div className="flex flex-col items-center justify-center p-6 space-y-6 w-full max-w-md mx-auto min-h-screen bg-slate-900 text-slate-100 pb-12">
                <div className="text-center mt-8">
                  <h2 className="text-4xl font-bold text-amber-400 mb-1">
                    {isPracticeMode ? (isLocalPerfect ? "Tout est corrigé !" : "Entraînement fini !") : "Session terminée !"}
                  </h2>
                  <p className="text-slate-400 text-sm">Difficulté : <span className="text-amber-300 font-bold">{selectedElo} Elo</span></p>
                </div>
                
                <div className="w-full space-y-3">
                  {displayTimes.map((t, i) => {
                    const eloText = dailyPuzzles[i] ? dailyPuzzles[i].explanation.split('\n')[0].split('|')[1]?.trim() : '';
                    const isPracticeSuccess = t === 'NA_solved' || (typeof t === 'string' && t.includes('_NA'));
                    let colorClass = 'text-emerald-400';
                    if (t === 'NA') colorClass = 'text-red-400';
                    else if (isPracticeSuccess) colorClass = 'text-emerald-400';

                    return (
                      <div key={i} className="flex justify-between items-center p-4 bg-slate-800 rounded-xl border border-slate-700 shadow-lg">
                        <span className="font-semibold text-slate-300">N°{i + 1} <span className="text-xs text-slate-500 ml-1">({eloText})</span></span>
                        <span className={`text-xl font-mono font-bold ${colorClass}`}>{formatTime(t)}</span>
                      </div>
                    );
                  })}
                </div>

                <div className={`w-full text-center p-4 ${isLocalPerfect ? 'bg-emerald-900/30 border-emerald-500/50' : 'bg-slate-800 border-slate-700'} border rounded-xl`}>
                    <p className="text-sm text-slate-300 mb-1">
                        {isLocalPerfect ? "Temps Total" : `Temps Total (${localSolvedCount}/5 résolus)`}
                    </p>
                    <p className={`text-3xl font-mono font-bold ${isLocalPerfect ? 'text-emerald-400' : 'text-amber-400'}`}>
                        {formatTime(stats.totalTime)}
                    </p>
                </div>

                <div className="w-full flex gap-3 mt-4">
                    <button onClick={copyToClipboard} className="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 text-white rounded-xl font-bold shadow-lg transition text-sm">Partager Officiel 📋</button>
                    <button onClick={() => setView('home')} className="flex-1 py-4 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-bold shadow-lg transition text-sm">Accueil</button>
                </div>
              </div>
            );
          };

          const renderBoard = () => {
            const currentPuzzle = dailyPuzzles[currentPuzzleIdx];
            const isBlackToPlay = currentPuzzle.color === 'b';

            const displayBoard = Array(8).fill(null).map(() => Array(8).fill(null));
            for (let r = 0; r < 8; r++) {
              for (let c = 0; c < 8; c++) {
                const alg = posToAlgebraic(r, c);
                const piece = game ? game.get(alg) : null;
                if (piece) displayBoard[r][c] = piece.color === 'w' ? piece.type.toUpperCase() : piece.type;
              }
            }

            const visualBoard = isBlackToPlay ? [...displayBoard].reverse().map(r => [...r].reverse()) : displayBoard;

            return (
              <div ref={boardRef} className="w-full aspect-square flex flex-col border-4 border-slate-800 rounded-sm overflow-hidden shadow-2xl relative touch-none select-none bg-slate-800">
                {visualBoard.map((row, visualR) => (
                  <div key={visualR} className="flex flex-1 w-full">
                    {row.map((charPiece, visualC) => {
                      const r = isBlackToPlay ? 7 - visualR : visualR;
                      const c = isBlackToPlay ? 7 - visualC : visualC;

                      const isDark = (r + c) % 2 === 1;
                      const isSelected = selectedSquare?.r === r && selectedSquare?.c === c;
                      const isDragged = ghostPiece?.originR === r && ghostPiece?.originC === c;
                      
                      let isLastMove = false;
                      if (historyIndex > 0 && currentPuzzle.moves[historyIndex - 1]) {
                        const lastM = currentPuzzle.moves[historyIndex - 1];
                        const from = algebraicToPos(lastM.substring(0, 2));
                        const to = algebraicToPos(lastM.substring(2, 4));
                        if ((r === from.r && c === from.c) || (r === to.r && c === to.c)) isLastMove = true;
                      }

                      let bgClass = isDark ? 'bg-[#769656]' : 'bg-[#eeeed2]';
                      if (isSelected) bgClass = 'bg-[#baca44]'; 
                      else if (isLastMove) bgClass = isDark ? 'bg-[#baba32]' : 'bg-[#f6f669]'; 
                      
                      return (
                        <div key={visualC} onPointerDown={(e) => handlePointerDown(e, r, c)} className={`flex-1 relative flex items-center justify-center ${bgClass} cursor-pointer`}>
                          {charPiece && <img src={PIECE_URLS[charPiece]} alt={charPiece} className={`w-full h-full p-1 drop-shadow-md z-10 ${charPiece === charPiece.toUpperCase() ? 'brightness-110' : ''} ${isDragged ? 'opacity-30' : ''}`} draggable="false" />}
                          {visualC === 0 && <span className={`absolute top-0.5 left-0.5 text-[10px] font-bold ${isDark ? 'text-[#eeeed2]' : 'text-[#769656]'}`}>{8 - r}</span>}
                          {visualR === 7 && <span className={`absolute bottom-0.5 right-0.5 text-[10px] font-bold ${isDark ? 'text-[#eeeed2]' : 'text-[#769656]'}`}>{String.fromCharCode(97 + c)}</span>}
                        </div>
                      );
                    })}
                  </div>
                ))}
              </div>
            );
          };

          const renderPlaying = () => {
            const currentPuzzle = dailyPuzzles[currentPuzzleIdx];
            
            // Calculer dynamiquement le texte du bouton "Suivant"
            const hKey = getHistoryKey(selectedDate, selectedElo);
            const histDay = history[hKey];
            const isCorrectionSession = isPracticeMode && histDay && (histDay.officialTimes || histDay.times).some(t => t === 'NA');
            const hasRemainingNAs = puzzleTimes.some(t => t === 'NA');

            let nextBtnText = "Suivant";
            if (!isPracticeMode) {
                let tempIdx = currentPuzzleIdx + 1;
                while(tempIdx < 5 && puzzleTimes[tempIdx] !== null) tempIdx++;
                nextBtnText = tempIdx >= 5 ? "Terminer" : "Problème Suivant";
            } else {
                if (isCorrectionSession) {
                    nextBtnText = hasRemainingNAs ? "Suivant" : "Terminer";
                } else {
                    nextBtnText = currentPuzzleIdx < 4 ? "Suivant" : "Terminer";
                }
            }

            return (
              <div className="flex flex-col items-center w-full max-w-md mx-auto h-full min-h-screen bg-slate-900 text-slate-100 p-4 pb-8 overflow-y-auto" onPointerMove={handleGlobalPointerMove} onPointerUp={handleGlobalPointerUp} onPointerLeave={handleGlobalPointerUp}>
                <div className="w-full flex justify-between items-center mb-6 bg-slate-800 p-4 rounded-xl border border-slate-700">
                  <div className="flex space-x-1.5 sm:space-x-2">
                    {[0, 1, 2, 3, 4].map(i => {
                      let dotClass = '';
                      const isPracticeSuccess = puzzleTimes[i] === 'NA_solved' || (typeof puzzleTimes[i] === 'string' && puzzleTimes[i].includes('_NA'));
                      
                      if (i === currentPuzzleIdx) {
                          if (puzzleState === 'solved') {
                              dotClass = 'bg-emerald-500 text-white shadow-[0_0_15px_rgba(16,185,129,0.5)]'; 
                          } else if (puzzleState === 'failed') {
                              dotClass = 'bg-red-500 text-white shadow-[0_0_15px_rgba(239,68,68,0.5)]'; 
                          } else {
                              dotClass = 'bg-amber-600 text-white shadow-[0_0_15px_rgba(217,119,6,0.5)]'; 
                          }
                      } 
                      else if (puzzleTimes[i] === 'NA') {
                          dotClass = 'bg-red-900/50 text-red-400 border border-red-500/50';
                      } else if (isPracticeSuccess) {
                          dotClass = 'bg-emerald-900/50 text-emerald-400 border border-emerald-500/50';
                      } else if (typeof puzzleTimes[i] === 'number') {
                          dotClass = 'bg-emerald-900/50 text-emerald-400 border border-emerald-500/50';
                      } else {
                          dotClass = 'bg-slate-700 text-slate-500';
                      }
                      
                      return (
                        <div 
                          key={i} 
                          onClick={() => { 
                              if (isPracticeMode && !isAnimating) { 
                                  initPuzzle(i); 
                                  playSound('flip'); 
                              } 
                          }} 
                          className={`w-8 h-8 sm:w-10 sm:h-10 rounded-lg flex items-center justify-center font-bold font-mono text-xs sm:text-sm ${dotClass} ${isPracticeMode && i !== currentPuzzleIdx ? 'cursor-pointer hover:scale-110 transition-transform hover:ring-2 ring-white/30' : ''}`}
                        >
                          {i + 1}
                        </div>
                      );
                    })}
                  </div>
                  <div className="flex flex-col items-end">
                    <div className={`text-2xl sm:text-3xl font-mono font-bold ${globalTime < 60 ? 'text-red-400 animate-pulse' : 'text-slate-100'}`}>{formatTime(globalTime)}</div>
                  </div>
                </div>

                <div className="w-full aspect-square perspective-1000">
                  <div className={`relative w-full h-full transition-transform duration-700 preserve-3d cursor-pointer ${flipped ? 'rotate-y-180' : ''}`} onClick={() => { 
                      if(puzzleState !== 'playing' && !isAnimating) { 
                          setFlipped(!flipped); 
                          playSound('flip'); 
                      } 
                  }}>
                    <div className="absolute w-full h-full backface-hidden">{renderBoard()}</div>
                    <div className="absolute w-full h-full backface-hidden rotate-y-180 bg-slate-800 rounded-xl border border-slate-600 p-6 flex flex-col justify-center items-center text-center shadow-2xl">
                      <h3 className={`text-xl font-bold mb-2 ${puzzleState === 'solved' ? 'text-emerald-400' : 'text-red-400'}`}>{puzzleState === 'solved' ? 'Problème Résolu !' : 'Problème Non Résolu'}</h3>
                      <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 mb-4 w-full">
                        <p className="font-mono text-amber-300 mb-2 text-sm">{currentPuzzle.explanation.split('\n')[0]}</p>
                        <p className="text-slate-300 text-sm leading-relaxed">{currentPuzzle.explanation.split('\n')[1]}</p>
                      </div>
                      <p className="text-xs text-slate-500 mb-6">Cliquez n'importe où sur la carte pour revoir l'échiquier.</p>
                      
                      {isPracticeMode ? (
                          <div className="flex gap-3 w-full relative z-50">
                              <button onClick={(e) => { e.stopPropagation(); prevPuzzle(); }} disabled={currentPuzzleIdx === 0 || isAnimating} className="flex-1 py-3 bg-slate-700 hover:bg-slate-600 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl font-bold shadow-lg transition">
                                  Précédent
                              </button>
                              <button onClick={(e) => { e.stopPropagation(); nextPuzzle(); }} disabled={isAnimating} className="flex-1 py-3 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl font-bold shadow-lg transition">
                                  {nextBtnText}
                              </button>
                          </div>
                      ) : (
                          <button onClick={(e) => { e.stopPropagation(); nextPuzzle(); }} disabled={isAnimating} className="w-full py-3 bg-amber-600 hover:bg-amber-500 disabled:opacity-50 disabled:cursor-not-allowed text-white rounded-xl font-bold shadow-lg relative z-50 transition">
                            {nextBtnText}
                          </button>
                      )}
                    </div>
                  </div>
                </div>

                <div className="w-full mt-4 flex flex-col gap-3 bg-white p-3 rounded-xl shadow-lg text-slate-800">
                  <div className="flex flex-row gap-2 items-stretch h-10">
                    <div className={`${isPracticeMode ? 'w-2/5' : 'w-1/2'} flex justify-between items-center bg-slate-100 p-1 rounded-lg border border-slate-200 transition-all`}>
                      <button onClick={() => navigateHistory(-1)} disabled={historyIndex === 0 || isAnimating} className="p-1 bg-slate-200 disabled:opacity-30 rounded hover:bg-slate-300 transition flex items-center justify-center text-slate-800"><IconArrowLeft size={14} /></button>
                      <span className="font-mono text-[10px] sm:text-xs font-bold text-slate-600 truncate px-1 text-center">{puzzleState === 'playing' ? (historyIndex === maxHistoryIndex ? 'Actuel' : `-${maxHistoryIndex - historyIndex}`) : `${historyIndex}/${currentPuzzle.moves.length}`}</span>
                      <button onClick={() => navigateHistory(1)} disabled={isAnimating || (puzzleState === 'playing' ? historyIndex === maxHistoryIndex : historyIndex === currentPuzzle.moves.length)} className="p-1 bg-slate-200 disabled:opacity-30 rounded hover:bg-slate-300 transition flex items-center justify-center text-slate-800"><IconArrowRight size={14} /></button>
                    </div>

                    {isPracticeMode ? (
                      <div className="w-3/5 flex gap-1.5">
                         <button onClick={prevPuzzle} disabled={currentPuzzleIdx === 0 || isAnimating} className="flex-1 bg-slate-200 hover:bg-slate-300 disabled:opacity-30 text-slate-700 rounded-lg flex justify-center items-center transition"><IconArrowLeft size={16}/></button>
                         {puzzleState === 'playing' ? (
                            <button onClick={surrenderPuzzle} disabled={isAnimating} className="flex-[2] bg-slate-50 hover:bg-red-50 disabled:opacity-50 text-slate-600 hover:text-red-50 border border-slate-200 rounded-lg font-bold transition text-xs">Solution</button>
                         ) : (
                            <button onClick={nextPuzzle} disabled={isAnimating} className="flex-[2] bg-amber-500 hover:bg-amber-400 disabled:opacity-30 text-white rounded-lg font-bold shadow-md transition text-xs">{nextBtnText}</button>
                         )}
                      </div>
                    ) : (
                      puzzleState === 'playing' ? (
                        <button onClick={surrenderPuzzle} disabled={isAnimating} className="w-1/2 bg-slate-50 hover:bg-red-50 disabled:opacity-50 text-slate-600 hover:text-red-500 border border-slate-200 rounded-lg font-bold transition text-xs sm:text-sm">Réponse (NA)</button>
                      ) : (
                        !flipped ? <button onClick={(e) => { e.stopPropagation(); nextPuzzle(); }} disabled={isAnimating} className="w-1/2 bg-amber-500 hover:bg-amber-400 disabled:opacity-50 text-white rounded-lg font-bold shadow-md text-xs sm:text-sm">{nextBtnText}</button> : <div className="w-1/2"></div>
                      )
                    )}
                  </div>
                  <button onClick={() => finishDaily(true)} className="w-full py-2 bg-slate-50 hover:bg-slate-100 text-slate-500 hover:text-slate-700 rounded-lg font-semibold transition text-xs border border-slate-200">Retour à l'accueil</button>
                </div>
              </div>
            );
          };

          return (
            <div className="flex h-screen bg-slate-900 w-full overflow-hidden">
                <div className="flex-1 overflow-y-auto relative w-full">
                    {ghostPiece && <img src={PIECE_URLS[ghostPiece.piece]} alt="dragged" className="fixed pointer-events-none z-[100] w-16 h-16 drop-shadow-2xl" style={{left: ghostPiece.x, top: ghostPiece.y, transform: 'translate(-50%, -50%)', filter: ghostPiece.piece === ghostPiece.piece.toUpperCase() ? 'brightness(1.1)' : 'none'}} />}
                    {view === 'home' && renderHome()}
                    {view === 'playing' && renderPlaying()}
                    {view === 'summary' && renderSummary()}
                    {view === 'leaderboard' && renderLeaderboard()}
                </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
